name: New version full review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: new-version-full-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  refactor-quality:
    name: Refactor quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run refactor quality checks
        run: npm run ci:refactor-review

  code-docs-quality:
    name: JSDoc and inline docs quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run JSDoc and inline docs checks
        run: npm run ci:docs-code-review

  docs-review:
    name: Docs and README changelog review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: npm ci
      - name: Install docs requirements
        run: python3 -m pip install -r requirements-docs.txt
      - name: Show docs diff scope
        run: node scripts/ci-docs-diff-scope.cjs
      - name: Run docs review checks
        run: npm run ci:docs-review

  ai-cursor-review:
    name: AI Cursor review
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft
    uses: ./.github/workflows/ai-cursor-review.yml
    secrets: inherit
    permissions:
      contents: write
      pull-requests: write
